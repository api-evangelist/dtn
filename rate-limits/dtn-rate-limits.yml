specification: API Commons Rate Limits
specificationVersion: '0.1'
schema: https://raw.githubusercontent.com/api-evangelist/interface-research/main/schema/api-commons.yml#/$defs/RateLimits
provider: DTN
providerId: dtn
created: '2026-05-04'
modified: '2026-05-05'
reconciled: false
tags:
  - Weather
  - Agriculture
  - Aviation
  - Marine
  - Rate Limiting
description: DTN does not publish numeric per-second/per-minute rate limits across its developer portal
  catalog. Effective limits are governed by the subscription tier and API key, and feed-style endpoints
  expect periodic (not high-frequency) polling aligned with the underlying data update cadence.
sources:
  - https://devportal.dtn.com/
  - https://www.dtn.com/resources/api-data-integrations/
notes: No public rate-limit numbers; reconciled=false.
responseCodes:
  throttled: 429
  serviceUnavailable: 503
limits:
  - name: Subscription-bound API access
    scope: api-key
    metric: varies
    limit: see DTN subscription / contact sales
    notes: Endpoint scope (forecast horizon, observation retention) and effective rate are bound to the
      subscription tier.
policies:
  - name: Subscription Permissions
    description: API key permissions vary with subscription tier; some endpoints (e.g. 15-day forecast)
      are gated by tier.
  - name: Backoff Strategy
    description: Clients should implement exponential backoff with jitter on 429/503 responses.
  - name: Polling Cadence
    description: Forecast and observation endpoints update on a defined cadence; clients should align
      polling with the data update frequency rather than continuous polling.
maintainers:
  - FN: Kin Lane
    email: kin@apievangelist.com
