specification: FinOps Framework
specificationVersion: '1.0'
alignedWith:
  framework: FinOps Foundation Framework
  frameworkUrl: https://www.finops.org/framework/
  dataSpec: FOCUS
  dataSpecVersion: '1.3'
  dataSpecUrl: https://focus.finops.org/focus-specification/v1-3/
provider: dtn
providerId: dtn
publisherName: dtn
serviceCategory: API
created: '2026-05-04'
modified: '2026-05-04'
tags:
  - FinOps
  - Cost Management
  - FOCUS
description: FinOps framework definition for the dtn API surface. Provides a FOCUS-aligned mapping for
  cost allocation, usage measurement, and unit-economics reporting across the provider's APIs.
principles:
  - name: Visibility
    description: Make API consumption costs visible to engineering, product, and finance teams in near
      real-time.
  - name: Allocation
    description: Tag every chargeable API call with the consuming team, environment, application, and
      feature so cost can be allocated.
  - name: Optimization
    description: Continuously evaluate request patterns, caching, batching, and tier selection to reduce
      cost per useful unit of work.
  - name: Accountability
    description: Establish budget owners and chargeback or showback flows for each consuming team.
domains:
  - name: Understand Usage and Cost
    capabilities:
      - Data Ingestion
      - Allocation
      - Reporting and Analytics
      - Anomaly Management
  - name: Quantify Business Value
    capabilities:
      - Planning and Estimating
      - Forecasting
      - Budgeting
      - Benchmarking
      - Unit Economics
  - name: Optimize Usage and Cost
    capabilities:
      - Architecting for Cloud
      - Rate Optimization
      - Workload Optimization
      - Cloud Sustainability
      - Licensing and SaaS
  - name: Manage the FinOps Practice
    capabilities:
      - FinOps Practice Operations
      - FinOps Education and Enablement
      - Invoicing and Chargeback
      - Onboarding Workloads
      - Intersecting Disciplines
billingModel:
  pricingCategory: Usage-Based
  billingFrequency: Monthly
  billingCurrency: USD
  chargeCategories:
    - Usage
    - Purchase
    - Tax
    - Credit
    - Adjustment
  chargeFrequency: Recurring
focusColumns:
  ServiceName: dtn
  ServiceCategory: Developer Tools / API
  ProviderName: dtn
  PublisherName: dtn
  InvoiceIssuerName: dtn
  PricingCategory: Usage-Based
  PricingUnit: request
  BillingCurrency: USD
  ChargeCategory: Usage
meters:
  - name: api_requests
    description: Count of billable API requests
    unit: request
    aggregation: sum
    dimensions:
      - api
      - endpoint
      - tier
      - region
      - consumer
  - name: data_egress
    description: Bytes returned over the network in API responses
    unit: GB
    aggregation: sum
    dimensions:
      - api
      - region
      - consumer
  - name: compute_seconds
    description: Server-side compute consumed by the request, where applicable
    unit: second
    aggregation: sum
    dimensions:
      - api
      - endpoint
      - tier
apis:
  - name: DTN Weather Conditions API
    baseURL: https://weather.api.dtn.com/conditions
    tags:
      - Agriculture
      - Climate
      - Forecast
      - REST
      - Weather
    serviceName: DTN Weather Conditions API
    serviceCategory: API
  - name: DTN Point Observation API
    baseURL: https://point-observation.weather.mg
    tags:
      - Agriculture
      - Historical Data
      - Observations
      - Weather
    serviceName: DTN Point Observation API
    serviceCategory: API
  - name: DTN Point Forecast API
    baseURL: https://point-forecast.weather.mg
    tags:
      - Agriculture
      - Aviation
      - Forecast
      - Weather
    serviceName: DTN Point Forecast API
    serviceCategory: API
  - name: DTN Radar Precipitation Forecast API
    baseURL: https://precipitation-forecast.weather.mg
    tags:
      - Precipitation
      - Radar
      - Short-Term Forecast
      - Weather
    serviceName: DTN Radar Precipitation Forecast API
    serviceCategory: API
  - name: DTN Commodity & Market Data API
    baseURL: https://api.dtn.com
    tags:
      - Agriculture
      - Commodity Prices
      - Grain
      - Livestock
      - Market Data
    serviceName: DTN Commodity & Market Data API
    serviceCategory: API
unitEconomics:
  - name: Cost per 1K Requests
    metric: billed_cost / (api_requests / 1000)
    target: TBD
  - name: Cost per Active Consumer
    metric: billed_cost / active_consumers
    target: TBD
maintainers:
  - name: Kin Lane
    email: kin@apievangelist.com
