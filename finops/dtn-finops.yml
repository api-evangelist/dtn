specification: FinOps Framework
specificationVersion: '1.0'
schema: https://www.finops.org/framework/
alignedWith:
  framework: FinOps Foundation Framework
  frameworkUrl: https://www.finops.org/framework/
  dataSpec: FOCUS
  dataSpecVersion: '1.3'
  dataSpecUrl: https://focus.finops.org/focus-specification/v1-3/
provider: DTN
providerId: dtn
publisherName: DTN, LLC
serviceCategory: Weather & Industry Data
created: '2026-05-04'
modified: '2026-05-05'
reconciled: false
tags:
  - Weather
  - Agriculture
  - Aviation
  - Marine
  - FinOps
  - FOCUS
description: FOCUS-aligned FinOps shape for DTN. Billing is custom subscription per industry vertical
  (Weather, Marine, Agribusiness, Aviation, Refined Fuels). A subset is also available pay-as-you-go via
  AWS Marketplace.
notes: No public per-call meter; reconciled=false.
sources:
  - https://devportal.dtn.com/
  - https://www.dtn.com/resources/api-data-integrations/
  - https://aws.amazon.com/marketplace/pp/prodview-yohehde7bckaq
billingModel:
  pricingCategory: Subscription (or AWS Marketplace PAYG)
  billingFrequency: Per-Invoice
  billingCurrency: USD
  chargeCategories:
    - Purchase
    - Usage
    - Tax
focusColumns:
  ServiceName: DTN APIs
  ServiceCategory: Weather & Industry Data
  ProviderName: DTN
  PublisherName: DTN, LLC
  InvoiceIssuerName: DTN, LLC (or AWS Marketplace)
  BillingCurrency: USD
  ChargeCategory: Purchase
meters:
  - name: api_requests
    description: Internal observability of calls against DTN endpoints
    unit: request
    aggregation: sum
    dimensions:
      - api
      - endpoint
      - subscription_tier
  - name: subscription_seats
    description: Active DTN subscriptions
    unit: seat
    aggregation: count
    dimensions:
      - vertical
  - name: aws_marketplace_units
    description: Metered units when consumed via AWS Marketplace
    unit: varies
    aggregation: sum
    dimensions:
      - product
principles:
  - name: Visibility
    description: Reconcile DTN invoices (or AWS Marketplace charges) against subscription scope; cache
      forecast and observation responses at the subscription's update cadence.
  - name: Allocation
    description: Allocate DTN cost to the line of business consuming the data (agronomy, fleet ops, refined-fuels
      ops, aviation safety).
  - name: Optimization
    description: Right-size the forecast horizon to the lowest tier that meets the use case; cache observation
      pulls; coalesce duplicate point forecasts at the geofence level.
  - name: Accountability
    description: Subscription owner per vertical is accountable for renewal terms and adherence to subscription
      scope.
maintainers:
  - FN: Kin Lane
    email: kin@apievangelist.com
